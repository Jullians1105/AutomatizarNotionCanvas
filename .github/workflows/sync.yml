name: Canvas → Notion Sync

on:
  schedule:
    - cron: "0 14 * * 1-5"   # 9am Colombia (UTC-5) lun-vie
    - cron: "0 2 * * 2-6"    # 9pm Colombia (UTC-5) lun-vie (2 UTC = día siguiente)
    - cron: "0 21 * * 6"     # 4pm Colombia (UTC-5) sábado
  workflow_dispatch:        # permite ejecución manual desde GitHub

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4.2.2

      - name: Configurar Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar sincronización
        env:
          CANVAS_API_TOKEN: ${{ secrets.CANVAS_API_TOKEN }}
          CANVAS_BASE_URL: ${{ secrets.CANVAS_BASE_URL }}
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
